<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nuclear Safeguards Copilot</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body>
  <div class="hero-gradient py-4 mb-4">
    <div class="container">
      <div class="d-flex flex-wrap align-items-center justify-content-between gap-3">
        <div>
          <p class="badge text-bg-light mb-2">IAEA Safeguards RAG MVP</p>
          <h1 class="h2 text-white mb-1">Nuclear Safeguards Copilot</h1>
          <p class="text-white-50 mb-0">
            Ask questions about official safeguards documents. Answers are grounded in retrieved sources only.
          </p>
        </div>
        <div class="status-pill" id="statusPill">Ready</div>
      </div>
    </div>
  </div>

  <main class="container pb-5">
    <div class="row g-4">
      <div class="col-lg-8">
        <section class="card shadow-sm border-0 chat-card">
          <div class="card-body p-4">
            <label for="questionInput" class="form-label fw-semibold">Your question</label>
            <textarea
              id="questionInput"
              class="form-control form-control-lg mb-3"
              rows="3"
              placeholder="e.g. What is a Material Balance Area?"
            ></textarea>
            <div class="d-flex flex-wrap gap-2 mb-3">
              <button class="btn btn-outline-secondary btn-sm sample-btn" data-question="What is Material Balance Area?">Material Balance Area</button>
              <button class="btn btn-outline-secondary btn-sm sample-btn" data-question="Explain Additional Protocol.">Additional Protocol</button>
              <button class="btn btn-outline-secondary btn-sm sample-btn" data-question="Compare CSA and Additional Protocol.">Compare CSA vs AP</button>
            </div>
            <button id="sendBtn" class="btn btn-primary btn-lg px-4">
              <span id="sendBtnText">Send Question</span>
              <span id="sendSpinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status"></span>
            </button>
          </div>
        </section>

        <section class="card shadow-sm border-0 mt-4 answer-card d-none" id="answerSection">
          <div class="card-body p-4">
            <h2 class="h5 mb-3">Answer</h2>
            <div id="answerText" class="answer-body"></div>
            <div class="mt-3 text-muted small" id="metaInfo"></div>
          </div>
        </section>
      </div>

      <div class="col-lg-4">
        <section class="card shadow-sm border-0 sources-card">
          <div class="card-body p-4">
            <h2 class="h5 mb-3">Sources</h2>
            <div id="sourcesEmpty" class="text-muted">Sources will appear here after you ask a question.</div>
            <div id="sourcesList" class="vstack gap-3"></div>
          </div>
        </section>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
